<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg-dark: #07111e;
            --bg-card: #0f213a;
            --lnp-blue: #004b93;
            --lnp-orange: #ff6600;
            --lnp-orange-hover: #e05500;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --court-wood: #e7a96d;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark) !important;
            color: var(--text-main) !important;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            width: 100%;
            max-width: 1350px;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 15px;
            background: #091729;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: grid-template-columns 0.5s ease-in-out;
        }

        .game-container.game-mode {
            grid-template-columns: 400px 1fr;
        }

        @media (max-width: 950px) {
            .game-container, .game-container.game-mode { 
                grid-template-columns: 1fr !important; 
            }
            
            .match-scoreboard, .match-commentary, #match-actions {
                text-align: center !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                justify-content: center !important;
                margin: 10px auto !important;
                width: 100% !important;
            }

            .court-inner-wood {
                height: auto !important;
                min-height: 180px;
                display: grid !important;
                grid-template-columns: repeat(5, 1fr) !important;
                gap: 5px !important;
                padding: 5px !important;
            }
            .court-player-slot {
                width: auto !important;
                padding: 4px !important;
            }
            .court-player-slot .p-club, .court-player-slot .p-stats-mini {
                display: none !important;
            }
            .court-player-slot .p-name {
                font-size: 0.7rem !important;
            }
            .draft-options-row {
                grid-template-columns: repeat(2, 1fr) !important;
            }
        }

        .main-court-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .scoreboard-top {
            background: linear-gradient(180deg, var(--lnp-blue) 0%, #091729 100%);
            border-bottom: 3px solid var(--lnp-orange);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .scoreboard-top h1 {
            margin: 0;
            font-size: 1.8rem;
            color: white !important;
            letter-spacing: 1px;
        }

        .scoreboard-top h1 span {
            color: var(--lnp-orange) !important;
        }

        .next-match-banner {
            margin-top: 8px;
            background: var(--bg-card);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            min-height: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .live-ticker {
            color: #38bdf8 !important;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            margin-top: 4px;
            min-height: 22px;
        }

        .basketball-court {
            background-color: var(--lnp-blue) !important;
            border: 4px solid white !important;
            border-radius: 12px;
            padding: 15px;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            transition: all 0.5s ease-in-out;
        }

        .game-mode .basketball-court {
            padding: 8px;
        }

        .game-mode .court-inner-wood {
            height: 160px;
            flex-wrap: wrap;
            gap: 4px;
        }

        .game-mode .court-player-slot {
            width: 70px;
            padding: 3px;
        }

        .game-mode .p-club, .game-mode .p-stats-mini {
            display: none !important;
        }

        .game-mode .p-name {
            font-size: 0.75rem;
        }

        .court-inner-wood {
            background-color: var(--court-wood) !important;
            background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 30px, rgba(0,0,0,0.03) 30px, rgba(0,0,0,0.03) 60px) !important;
            border: 3px solid white !important;
            height: 280px;
            border-radius: 6px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease-in-out;
        }

        .court-inner-wood::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 3px;
            background: white !important;
        }

        .court-inner-wood::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border: 3px solid white !important;
            border-radius: 50%;
        }

        .court-player-slot {
            width: 140px;
            background: #07111e !important;
            border: 2px solid #334155 !important;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            z-index: 2;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        .court-player-slot.filled {
            border-color: var(--lnp-orange) !important;
            background: var(--bg-card) !important;
        }

        .role-indicator {
            background: var(--lnp-orange) !important;
            color: white !important;
            font-weight: bold;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .p-name {
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 2px;
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            color: #ffffff !important;
        }

        .p-club {
            font-size: 0.7rem;
            color: var(--text-muted) !important;
            margin-bottom: 5px;
            height: 18px;
            overflow: hidden;
        }

        .p-stats-mini {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            font-size: 0.65rem;
            background: rgba(0,0,0,0.4) !important;
            padding: 4px;
            border-radius: 4px;
            margin-top: 4px;
        }

        .draft-panel-bottom {
            background: #050d18 !important;
            border: 2px solid var(--lnp-blue) !important;
            border-radius: 10px;
            padding: 12px;
        }

        .draft-panel-title {
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--lnp-orange) !important;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .draft-options-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        @media (max-width: 768px) {
            .draft-options-row {
                grid-template-columns: 1fr;
            }
        }

        .draft-option-card {
            background: #0f2439 !important;
            border: 2px solid #1e3d59 !important;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: center;
            opacity: 1 !important;
            filter: none !important;
            visibility: visible !important;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5) !important;
        }

        .draft-option-card:hover {
            border-color: var(--lnp-orange) !important;
        }

        .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .action-box {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .record-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .record-text span.w { 
            color: #10b981 !important; 
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.3) !important;
        }
        .record-text span.l { 
            color: #ef4444 !important; 
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.3) !important;
        }

        button {
            background: var(--lnp-orange) !important;
            color: white !important;
            border: none;
            padding: 8px 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        button:hover { background: var(--lnp-orange-hover) !important; }
        button:disabled {
            background: #334155 !important;
            color: #64748b !important;
            cursor: not-allowed;
            box-shadow: none;
        }

        button.btn-choose {
            background: var(--lnp-blue) !important;
            color: white !important;
            padding: 5px;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .calendar-box {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            max-height: 420px;
            border: 1px solid #1e293b;
        }

        .calendar-title {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #334155;
            padding-bottom: 4px;
            margin-bottom: 8px;
            color: var(--text-muted) !important;
        }

        .calendar-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .calendar-item {
            font-size: 0.8rem;
            padding: 8px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .calendar-item.win {
            border-left: 4px solid var(--success) !important;
            background: rgba(16,185,129,0.07) !important;
        }

        .calendar-item.loss {
            border-left: 4px solid var(--danger) !important;
            background: rgba(239,68,68,0.07) !important;
        }

        .cal-row-mvp {
            font-size: 0.7rem;
            color: var(--lnp-orange) !important;
            font-style: italic;
        }

        .end-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 110;
            justify-content: center;
            align-items: center;
        }

        .loader-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 3px solid var(--lnp-orange);
            max-width: 460px;
            width: 90%;
        }

        .game-mode #match-banner-info {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            width: 92%;
            max-width: 500px;
            background: rgba(15, 23, 42, 0.98) !important;
            border: 2px solid var(--lnp-orange);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            text-align: center;
            box-sizing: border-box;
        }

        #main-game-viewport.game-mode::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9998;
            pointer-events: all;
        }

        .game-mode #live-simulation-ticker {
            font-size: 1.15rem;
            color: #38bdf8 !important;
            margin-top: 12px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            border-left: 4px solid var(--lnp-orange);
        }

        .lnp-text-win { color: #10b981 !important; font-weight: bold !important; }
        .lnp-text-loss { color: #ef4444 !important; font-weight: bold !important; }
        .lnp-text-pending { color: #aaaaaa !important; }
    </style>
</head>

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;

        function generatePerfectSchedule() {
            initChampionshipData();
            fullLeagueSchedule = [];
            
            let list = ["La Tua Squadra", ...shuffleArray([...opponentTeams])];
            const numTeams = list.length;
            const rounds = numTeams - 1; 

            for (let r = 0; r < rounds; r++) {
                let roundMatches = [];
                for (let i = 0; i < numTeams / 2; i++) {
                    let home = list[i];
                    let away = list[numTeams - 1 - i];
                    
                    if (r % 2 === 1) {
                        roundMatches.push({ home: away, away: home, score: "", simulated: false });
                    } else {
                        roundMatches.push({ home: home, away: away, score: "", simulated: false });
                    }
                }
                fullLeagueSchedule.push({ round: r + 1, matches: roundMatches });
                list.splice(1, 0, list.pop());
            }

            for (let r = 0; r < rounds; r++) {
                let roundMatches = fullLeagueSchedule[r].matches.map(m => {
                    return { home: m.away, away: m.home, score: "", simulated: false };
                });
                fullLeagueSchedule.push({ round: r + rounds + 1, matches: roundMatches });
            }

            renderCalendarAndStandings();
        }

        function simulateCPUMatches(currentRound) {
            const roundData = fullLeagueSchedule[currentRound - 1];
            if (!roundData) return;
            
            roundData.matches.forEach(match => {
                if (match.home === "La Tua Squadra" || match.away === "La Tua Squadra") return; 

                let homePlayers = allPlayers.filter(p => p.club === match.home);
                let homeOvr = homePlayers.reduce((acc, p) => acc + (p.ovr || 75), 0) / (homePlayers.length || 1);
                let awayPlayers = allPlayers.filter(p => p.club === match.away);
                let awayOvr = awayPlayers.reduce((acc, p) => acc + (p.ovr || 75), 0) / (awayPlayers.length || 1);

                let homeEff = 0.70 + ((homeOvr + 3) * 0.0035) + ((Math.random() * 14 - 7) / 100);
                let awayEff = 0.70 + (awayOvr * 0.0035) + ((Math.random() * 14 - 7) / 100);

                let pace = Math.round(72 + Math.random() * 12);
                let scoreHome = Math.round(pace * homeEff);
                let scoreAway = Math.round(pace * awayEff);

                if (scoreHome === scoreAway) scoreHome += Math.random() > 0.5 ? 2 : -2;

                match.score = `${scoreHome} - ${scoreAway}`;
                match.simulated = true;

                if (scoreHome > scoreAway) {
                    standings[match.home].wins++; standings[match.home].points += 2;
                    standings[match.away].losses++;
                } else {
                    standings[match.away].wins++; standings[match.away].points += 2;
                    standings[match.home].losses++;
                }
            });
        }

        function buildPlayoffBrackets() {
            if (!playoffBracket) {
                let sortedTeams = Object.values(standings).sort((a, b) => b.points - a.points || b.wins - a.wins);

                let userQualified = qualified.some(t => t.teamName === "La Tua Squadra");
                if (!userQualified) {
                    alert("Stagione Terminata! Fuori dai primi 8 posti.");
                    return;
                }

                playoffBracket = {
                    "Quarti": [
                        { teamA: qualified[0].teamName, seedA: 1, winsA: 0, teamB: qualified[7].teamName, seedB: 8, winsB: 0 },
                        { teamA: qualified[3].teamName, seedA: 4, winsA: 0, teamB: qualified[4].teamName, seedB: 5, winsB: 0 },
                        { teamA: qualified[1].teamName, seedA: 2, winsA: 0, teamB: qualified[6].teamName, seedB: 7, winsB: 0 },
                        { teamA: qualified[2].teamName, seedA: 3, winsA: 0, teamB: qualified[5].teamName, seedB: 6, winsB: 0 }
                    ],
                    "Semifinali": [],
                    "Finale": []
                };
                currentPlayoffRound = "Quarti";
                currentPlayoffGameNumber = 1;
            }
            
            renderCalendarAndStandings();
            triggerPlayoffSimulationLoop();
        }
        window.buildPlayoffBrackets = buildPlayoffBrackets;

        function triggerPlayoffSimulationLoop() {
            let roundSeries = playoffBracket[currentPlayoffRound];
            let allFinished = roundSeries.every(s => s.winsA === 3 || s.winsB === 3);
            if (allFinished) {
                advancePlayoffRound();
                return;
            }

            let userSerie = roundSeries.find(s => s.teamA === "La Tua Squadra" || s.teamB === "La Tua Squadra");
            if (!userSerie) {
                alert("Sei stato eliminato dai Playoff! Game Over.");
                return;
            }

            if (userSerie.winsA === 3 || userSerie.winsB === 3) {
                simulateCPUPlayoffGames();
                renderCalendarAndStandings();
                setTimeout(triggerPlayoffSimulationLoop, 200);
                return;
            }

            let isUserTeamA = userSerie.teamA === "La Tua Squadra";
            let opponentName = isUserTeamA ? userSerie.teamB : userSerie.teamA;
            let betterSeed = isUserTeamA ? (userSerie.seedA < userSerie.seedB) : (userSerie.seedB < userSerie.seedA);
            
            let isUserHome = [1, 2, 5].includes(currentPlayoffGameNumber) ? betterSeed : !betterSeed;

            const banner = document.getElementById('banner-main-text');
            if (banner) {
                banner.innerHTML = `
                    <div style="color:#ff9800; font-weight:bold; font-size:1.1rem; margin-bottom:2px;">🔥 PLAYOFF - ${currentPlayoffRound.toUpperCase()} (GARA ${currentPlayoffGameNumber})</div>
                    <div style="font-size:0.85rem; color:#fff; margin-bottom:6px;">SERIE: ${userSerie.teamA} [${userSerie.winsA}] - [${userSerie.winsB}] ${userSerie.teamB}</div>
                    <button onclick="executePlayoffGameLive()" style="background:#10b981; color:white; padding:10px; border-radius:6px; font-weight:bold; width:100%;">GIOCA GARA ${currentPlayoffGameNumber} 🏀</button>
                `;
            }
        }

        function simulateCPUPlayoffGames() {
            let roundSeries = playoffBracket[currentPlayoffRound];
            roundSeries.forEach(s => {
                if (s.teamA === "La Tua Squadra" || s.teamB === "La Tua Squadra") return;
                if (s.winsA === 3 || s.winsB === 3) return;

                let homePlayers = allPlayers.filter(p => p.club === s.teamA);
                let awayPlayers = allPlayers.filter(p => p.club === s.teamB);
                let ovrA = homePlayers.reduce((acc, p) => acc + (p.ovr || 75), 0) / (homePlayers.length || 1);
                let ovrB = awayPlayers.reduce((acc, p) => acc + (p.ovr || 75), 0) / (awayPlayers.length || 1);

                if (ovrA + 2 + Math.random() * 10 > ovrB + Math.random() * 10) { s.winsA++; } else { s.winsB++; }
            });
        }

        function advancePlayoffRound() {
            let roundSeries = playoffBracket[currentPlayoffRound];
            let winners = roundSeries.map(s => s.winsA === 3 ? { name: s.teamA, seed: s.seedA } : { name: s.teamB, seed: s.seedB });

            if (currentPlayoffRound === "Quarti") {
                playoffBracket["Semifinali"] = [
                    { teamA: winners[0].name, seedA: winners[0].seed, winsA: 0, teamB: winners[1].name, seedB: winners[1].seed, winsB: 0 },
                    { teamA: winners[2].name, seedA: winners[2].seed, winsA: 0, teamB: winners[3].name, seedB: winners[3].seed, winsB: 0 }
                ];
                currentPlayoffRound = "Semifinali";
                currentPlayoffGameNumber = 1;
                alert("🏆 Accedi alle SEMIFINALI Playoff!");
                buildPlayoffBrackets();
            } else if (currentPlayoffRound === "Semifinali") {
                playoffBracket["Finale"] = [
                    { teamA: winners[0].name, seedA: winners[0].seed, winsA: 0, teamB: winners[1].name, seedB: winners[1].seed, winsB: 0 }
                ];
                currentPlayoffRound = "Finale";
                currentPlayoffGameNumber = 1;
                alert("🔥 SEI IN FINALE PLAYOFF LNP!");
                buildPlayoffBrackets();
            } else if (currentPlayoffRound === "Finale") {
                let finalSerie = playoffBracket["Finale"][0];
                let champion = finalSerie.winsA === 3 ? finalSerie.teamA : finalSerie.teamB;
                if (champion === "La Tua Squadra") {
                    alert("👑 CAMPIONI! Hai completato la scalata LNP! 🏆");
                } else {
                    alert(`Campione LNP: ${champion}. Ritenta!`);
                }
            }
        }

        function executePlayoffGameLive() {
            let roundSeries = playoffBracket[currentPlayoffRound];
            let userSerie = roundSeries.find(s => s.teamA === "La Tua Squadra" || s.teamB === "La Tua Squadra");
            let isUserTeamA = userSerie.teamA === "La Tua Squadra";
            let opponentName = isUserTeamA ? userSerie.teamB : userSerie.teamA;

            const oppPlayers = allPlayers.filter(p => p.club === opponentName).slice(0, 5);
            const playersArray = Object.values(userTeam);
            
            let matchPace = Math.round(74 + Math.random() * 10);
            const myTeamOvrSum = playersArray.reduce((acc, p) => acc + (p.ovr || 75), 0) / 5;
            let finalUserScore = Math.round(matchPace * (0.72 + (myTeamOvrSum * 0.0035) + (Math.random()*0.1 - 0.05)));
            const oppAvgOvr = oppPlayers.length > 0 ? oppPlayers.reduce((acc, p) => acc + (p.ovr || 75), 0) / oppPlayers.length : 74;
            let finalOppScore = Math.round(matchPace * (0.72 + (oppAvgOvr * 0.0035) + (Math.random()*0.1 - 0.05)));

            if (finalUserScore === finalOppScore) finalUserScore += Math.random() > 0.5 ? 3 : -3;
            let isUserWin = finalUserScore > finalOppScore;
            
            if (isUserWin) {
                if (isUserTeamA) userSerie.winsA++; else userSerie.winsB++;
                userWins++;
            } else {
                if (isUserTeamA) userSerie.winsB++; else userSerie.winsA++;
                userLosses++;
            }

            simulateCPUPlayoffGames();

            const banner = document.getElementById('banner-main-text');
            if (banner) {
                banner.innerHTML = `
                    <div style="font-size:1.4rem; color:${isUserWin ? '#10b981':'#ef4444'} !important; font-weight:bold;">${isUserWin ? 'VITTORIA':'SCONFITTA'}: ${finalUserScore} - ${finalOppScore}</div>
                    <div style="background:rgba(255,255,255,0.06); padding:8px; border-radius:4px; font-size:0.85rem; margin:8px 0;">
                        Serie: ${userSerie.teamA} ${userSerie.winsA} - ${userSerie.winsB} ${userSerie.teamB}
                    </div>
                    <button onclick="closePlayoffBoxscore()" style="background:#004b93; color:white; padding:10px; border-radius:6px; font-weight:bold; width:100%;">AVANZA ➔</button>
                `;
            }
            renderCalendarAndStandings();
        }
        window.executePlayoffGameLive = executePlayoffGameLive;

        function closePlayoffBoxscore() {
            let roundSeries = playoffBracket[currentPlayoffRound];
            let userSerie = roundSeries.find(s => s.teamA === "La Tua Squadra" || s.teamB === "La Tua Squadra");
            if (userSerie.winsA === 3 || userSerie.winsB === 3) { currentPlayoffGameNumber = 1; } else { currentPlayoffGameNumber++; }
            buildPlayoffBrackets();
        }
        window.closePlayoffBoxscore = closePlayoffBoxscore;

        // --- MOTORE DI SIMULAZIONE CORRETTO SENZA BLOCCHI ---
        function simMatch() {
            if (currentMatchNumber > 38) {
                buildPlayoffBrackets();
                return;
            }

            const giornataData = fullLeagueSchedule[currentMatchNumber - 1];
            const myMatch = giornataData.matches.find(m => m.home === "La Tua Squadra" || m.away === "La Tua Squadra");
            const opponentName = myMatch.home === "La Tua Squadra" ? myMatch.away : myMatch.home;

            document.getElementById('main-game-viewport').classList.add('game-mode');
            
            const pBtn = document.getElementById('btn-play-game');
            if(pBtn) pBtn.disabled = true;

            const oppPlayers = allPlayers.filter(p => p.club === opponentName).slice(0, 5);
            let oppRosterNames = oppPlayers.map(p => p.cognome).join(", ");

            const banner = document.getElementById('banner-main-text');
            if(banner) {
                banner.innerHTML = `
                    <div style="color:#ff9800; font-weight:bold; font-size:0.9rem; margin-bottom:2px;">IN CORSO VS: ${opponentName.toUpperCase()}</div>
                    <div style="font-size:0.75rem; color:#ddd; margin-bottom:6px;">Lineup CPU: ${oppRosterNames || 'Generico'}</div>
                    <div id="match-status-text">Simulazione quarti...</div>
                `;
            }

            const playersArray = Object.values(userTeam); 
            let userShootingLuck = (Math.random() * 16) - 8;  
            let oppShootingLuck = (Math.random() * 16) - 8;   

            const selectElem = document.getElementById('tactic-select');
            const selectedTactic = selectElem ? selectElem.value : '3-2';
            let matchPace = Math.round(72 + Math.random() * 12);

            if (selectedTactic === '4-1') { userShootingLuck += 8; oppShootingLuck += 10; } 
            else if (selectedTactic === 'run-gun') { matchPace += 10; userShootingLuck = (Math.random() * 24) - 12; } 
            else if (selectedTactic === 'defense') { matchPace -= 6; oppShootingLuck -= 8; userShootingLuck -= 8; }

            const myTeamOvrSum = playersArray.reduce((acc, p) => acc + (p.ovr || 75), 0) / 5;
            const userEfficiency = 0.70 + (myTeamOvrSum * 0.0035) + (userShootingLuck / 100);
            let finalUserScore = Math.round(matchPace * userEfficiency);

            const oppAvgOvr = oppPlayers.length > 0 ? oppPlayers.reduce((acc, p) => acc + (p.ovr || 74), 0) / oppPlayers.length : 74;
            const oppEfficiency = 0.70 + (oppAvgOvr * 0.0035) + (oppShootingLuck / 100);
            let finalOppScore = Math.round(matchPace * oppEfficiency);

            if (finalUserScore === finalOppScore) finalUserScore += Math.random() > 0.5 ? 2 : -2;

            let isWin = finalUserScore > finalOppScore;
            myMatch.score = `${finalUserScore} - ${finalOppScore}`;
            myMatch.simulated = true;

            if (isWin) {
                userWins++;
                standings["La Tua Squadra"].wins++; standings["La Tua Squadra"].points += 2;
            } else {
                userLosses++;
                standings["La Tua Squadra"].losses++;
            }

            simulateCPUMatches(currentMatchNumber);

            // Calcolo Statistiche Boxscore fittizie (Richieste dallo screenshot strutturato)
            let userT2Att = Math.round(35 + Math.random()*10); let userT2Made = Math.round(userT2Att * (0.45 + Math.random()*0.15));
            let userT3Att = Math.round(18 + Math.random()*10); let userT3Made = Math.round(userT3Att * (0.30 + Math.random()*0.15));
            let userFtAtt = Math.round(12 + Math.random()*8); let userFtMade = Math.round(userFtAtt * 0.70);
            let userTotReb = Math.round(32 + Math.random()*12); let userTotAst = Math.round(14 + Math.random()*8); let userTotStl = Math.round(6 + Math.random()*5);

            let oppT2Att = Math.round(35 + Math.random()*10); let oppT2Made = Math.round(oppT2Att * (0.45 + Math.random()*0.15));
            let oppT3Att = Math.round(18 + Math.random()*10); let oppT3Made = Math.round(oppT3Att * (0.30 + Math.random()*0.15));
            let oppFtAtt = Math.round(12 + Math.random()*8); let oppFtMade = Math.round(oppFtAtt * 0.70);
            let oppTotReb = Math.round(32 + Math.random()*12); let oppTotAst = Math.round(14 + Math.random()*8); let oppTotStl = Math.round(6 + Math.random()*5);

            let maxPts = -1; let realMvpName = playersArray[0].cognome;
            let userPlayersHtml = "";
            playersArray.forEach(p => {
                let pPts = Math.round((p.ppg || 12) * (0.6 + Math.random()*0.8) + (finalUserScore * 0.02));
                let pReb = Math.round((p.rpg || 4) * (0.6 + Math.random()*0.8));
                let pAst = Math.round((p.apg || 3) * (0.6 + Math.random()*0.8));
                if(pPts > maxPts) { maxPts = pPts; realMvpName = p.cognome; }
                userPlayersHtml += `<div style="font-size:0.7rem; color:#fff; display:flex; justify-content:space-between; padding:1px 0;"><span>🏀 ${p.cognome}</span><strong>${pPts} PT | ${pReb} RB | ${pAst} AS</strong></div>`;
            });

            let oppPlayersHtml = "";
            oppPlayers.forEach(p => {
                let oPts = Math.round((p.ppg || 11) * (0.6 + Math.random()*0.8));
                oppPlayersHtml += `<div style="font-size:0.7rem; color:#eee; display:flex; justify-content:space-between; padding:1px 0;"><span>👤 ${p.cognome}</span><strong>${oPts} PT</strong></div>`;
            });

            let currentTick = 1;
            const ticker = document.getElementById('live-simulation-ticker');
            let liveTimer = setInterval(() => {
                if(currentTick <= 4) {
                    if(ticker) ticker.innerText = `Q${currentTick}...`;
                    currentTick++;
                } else {
                    clearInterval(liveTimer);
                    if(ticker) ticker.innerText = "";
                    renderCalendarAndStandings();

                    if(banner) {
                        let resultColor = isWin ? "#10b981" : "#ef4444";
                        let resultLabel = isWin ? "VITTORIA" : "SCONFITTA";

                        let boxscoreHtml = `
                            <div style="font-size:1.4rem; color:${resultColor} !important; font-weight:bold; text-align:center; margin-bottom:10px;">${resultLabel}: ${finalUserScore} - ${finalOppScore}</div>
                            <div style="background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3); padding:8px; border-radius:6px; margin-bottom:8px; text-align:left;">
                                <div style="color:#10b981; font-weight:bold; font-size:0.85rem; margin-bottom:4px;">🏀 LA TUA SQUADRA</div>
                                <div style="font-size:0.7rem; color:#aaa; display:grid; grid-template-columns: 1fr 1fr; gap:2px; margin-bottom:6px;">
                                    <span>Tiri da 2: <strong>${userT2Made}/${userT2Att} (${Math.round((userT2Made/userT2Att)*100)}%)</strong></span>
                                    <span>Rimbalzi: <strong>${userTotReb}</strong></span>
                                    <span>Tiri da 3: <strong>${userT3Made}/${userT3Att} (${Math.round((userT3Made/userT3Att)*100)}%)</strong></span>
                                    <span>Assist: <strong>${userTotAst}</strong></span>
                                    <span>Liberi: <strong>${userFtMade}/${userFtAtt}</strong></span>
                                    <span>Palle Perse: <span style="color:#ef4444;">${userTotStl}</span></span>
                                </div>
                                <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:4px;">${userPlayersHtml}</div>
                            </div>
                            <div style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); padding:8px; border-radius:6px; margin-bottom:10px; text-align:left;">
                                <div style="color:#ef4444; font-weight:bold; font-size:0.85rem; margin-bottom:4px;">🤖 ${opponentName.toUpperCase()}</div>
                                <div style="font-size:0.7rem; color:#aaa; display:grid; grid-template-columns: 1fr 1fr; gap:2px; margin-bottom:6px;">
                                    <span>Tiri da 2: <strong>${oppT2Made}/${oppT2Att} (${Math.round((oppT2Made/oppT2Att)*100)}%)</strong></span>
                                    <span>Rimbalzi: <strong>${oppTotReb}</strong></span>
                                    <span>Tiri da 3: <strong>${oppT3Made}/${oppT3Att} (${Math.round((oppT3Made/oppT3Att)*100)}%)</strong></span>
                                    <span>Assist: <strong>${oppTotAst}</strong></span>
                                    <span>Liberi: <strong>${oppFtMade}/${oppFtAtt}</strong></span>
                                    <span>Palle Perse: <span style="color:#ef4444;">${oppTotStl}</span></span>
                                </div>
                                <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:4px;">${oppPlayersHtml}</div>
                            </div>
                            <div style="font-size:0.75rem; color:#ff9800; text-align:center; margin:6px 0; font-weight:bold;">⭐ MVP: ${realMvpName} (${maxPts} PTS)</div>
                        `;

                        if (currentMatchNumber === 19) {
                            banner.innerHTML = boxscoreHtml + `
                                <hr style="border:0; border-top:1px solid rgba(255,255,255,0.15); margin:6px 0;">
                                <button onclick="startMidSeasonMarket()" style="background:#ff9800; color:#fff; padding:10px; border-radius:6px; font-weight:bold; width:100%;">Apri Mercato Di Riparazione 🔄</button>
                            `;
                        } else if (currentMatchNumber === 38) {
                            banner.innerHTML = boxscoreHtml + `
                                <button onclick="buildPlayoffBrackets()" style="background:#38a169; color:white; padding:10px; border-radius:6px; font-weight:bold; width:100%;">Accedi Ai Playoff LNP ➔</button>
                            `;
                            currentMatchNumber++;
                        } else {
                            banner.innerHTML = boxscoreHtml + `
                                <button onclick="closeBoxscore()" style="background:#004b93; color:#fff; padding:10px; border-radius:6px; font-weight:bold; width:100%;">Avanza al prossimo turno ➔</button>
                            `;
                            currentMatchNumber++;
                        }
                    }
                }
            }, 120);
        }
        window.simMatch = simMatch;

        function closeBoxscore() {
            document.getElementById('main-game-viewport').classList.remove('game-mode');
            const pBtn = document.getElementById('btn-play-game');
            if(pBtn) pBtn.disabled = false;

            const banner = document.getElementById('banner-main-text');
            if(banner) {
                const giornataData = fullLeagueSchedule[currentMatchNumber - 1];
                if(giornataData) {
                    const myMatch = giornataData.matches.find(m => m.home === "La Tua Squadra" || m.away === "La Tua Squadra");
                    const opponentName = myMatch.home === "La Tua Squadra" ? myMatch.away : myMatch.home;
                    banner.innerHTML = `Gara ${currentMatchNumber}: Prossimo turno contro <strong>${opponentName}</strong>.`;
                }
            }
        }
        window.closeBoxscore = closeBoxscore;

        function startMidSeasonMarket() {
            alert("Mercato Aperto! Scegli i tuoi cambi.");
            currentMatchNumber++;
            closeBoxscore();
        }
        window.startMidSeasonMarket = startMidSeasonMarket;
    </script>
            </body>
</html>
